<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify beta</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utility.css">
</head>

<body>
    <div class="container flex bg-black">
        <div class="left  ">
            <div class="close">
                <img src="images/close.svg" class="invert" alt="">
            </div>
            <div class="home bg-grey rounded m-1 p-1 ">
                <div class="logo"><img class="invert" src="images/logo.svg " alt=""></div>
                <ul>
                    <li><img class="invert" src="images/home.svg " alt="">Home</li>
                    <li><img class="invert" src="images/search.svg " alt="">Search</li>

                </ul>
            </div>
            <div class="library bg-grey rounded m-1 p-1">
                <div class="heading">
                    <h2>your library</h2>


                </div>

                <div class="songlist">

                    <ul>


                    </ul>


                </div>

            </div>
        </div>
        <div class="right  bg-grey rounded  ">
            <div class="header">
                <div class="nav">
                    <div class="hamburgerc">
                        <img width="40" height="40" class="invert hamburger" src="images/hamburger.svg" alt="">
                        
                        
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="currentColor" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="currentColor" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
                        </svg>

                    </div>
                </div>
                <div class="button">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>


                </div>
            </div>
            <div class="spotify-playlists">
                <h1>spotify playlist</h1>
                <div class="cardcontainer">

                   






                </div>
                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>
                    <div class="abovebar">

                        <div class=" soo " >

                        </div>
                        <div class="songbutttons">
                            <img width="30px" id="previous" src="images/previous.svg" alt="">
                            <img width="30px" id="play" src="images/play.svg" alt="">
                            <img width="30px" id="next" src="images/next.svg" alt="">
                        </div>
                        <div class="timevol">
                            
                            <div class="sooo">
        
                            </div>
                            <div class="volume">
                                <img width="20px" src="images/volume.svg" alt="">
                                <div class="range">
                                    <input type="range" name="volume" id="">
                                </div>
    
                            </div>
                        </div>

                    </div>

                </div>
                </div>
            </div>
        </div>
    </div>





    <script src="javascript/script.js"></script>
</body>

</html>
